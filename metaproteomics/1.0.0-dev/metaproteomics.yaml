name: metaproteomics
description: SDRF template for metaproteomics experiments (microbial community proteomics). Extends ms-proteomics with metaproteomics-specific columns.
documentation: |
  The metaproteomics template captures environmental and microbial community context for
  metaproteomics studies. Columns are organized by sample type:

  Environmental samples:
  - `characteristics[environmental sample type]`: Required. ENVO/EFO term (soil, seawater,
    gut microbiome, wastewater, biofilm).
  - `characteristics[geographic location]`: Recommended. GAZ terms or coordinates.
  - Physical/chemical parameters: temperature, pH, depth, salinity, dissolved oxygen.
  - Aquatic-specific: water body type, chlorophyll, sampling depth zone.
  - Soil-specific: soil type, soil horizon, land use, vegetation.

  Host-associated microbiome samples:
  - `characteristics[host organism]`: NCBI Taxonomy host species.
  - `characteristics[body site]`: UBERON/BTO site (stool, oral cavity, skin).
  - `characteristics[host diet]`: Diet information (omnivore, vegan, western diet).
  - `characteristics[antibiotic treatment]`: Recent antibiotic exposure.
  - `characteristics[microbiome source]`: Source microbiome type (gut, rhizosphere, oral).

  Mock communities and QC:
  - `characteristics[mock community]`: Standard used (ZymoBIOMICS, ATCC MSA-1000).
  - `comment[host contamination]`: Host protein contamination level (low <5%, moderate, high).
  - `comment[contaminant database]`: Database for contamination filtering (cRAP, MaxQuant).
  - `comment[metagenome accession]`: Link to matched metagenome dataset.

  Combine with human template for human gut/oral microbiome studies.
contributors:
  - Yasset Perez-Riverol (yperez@ebi.ac.uk) - EMBL-EBI
  - Deepti Jaiswal Kundu (jaiswal@ebi.ac.uk) - EMBL-EBI
