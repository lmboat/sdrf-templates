  - Nandana Madhusoodanan (nandana@ebi.ac.uk) - EMBL-EBI
  - Asier Larrea (alarre@ebi.ac.uk) - EMBL-EBI
  - Toan Phung (TPhung001@dundee.ac.uk) - University of Dundee
  - Timo Sachsenberg (timo.sachsenberg@uni-tuebingen.de) - University of Tübingen
version: 1.0.0-dev
extends: ms-proteomics
usable_alone: false
layer: experiment
columns:
  - name: characteristics[environmental sample type]
    ontology_accession: ENVO:00010483
    description: Type of environmental sample analyzed
    requirement: required
    allow_not_applicable: false
    allow_not_available: false
    validators:
      - validator_name: ontology
        params:
          ontologies:
            - envo
            - efo
          error_level: warning
          description: Should be a valid ENVO or EFO term
          examples:
            - soil
            - seawater
            - gut microbiome
            - wastewater
            - biofilm

  - name: characteristics[sample collection method]
    ontology_accession: OBI:0000659
    description: Method used to collect the environmental sample
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: Collection method description
          examples:
            - grab sample
            - core sample
            - swab
            - filtration

  - name: characteristics[geographic location]
    ontology_accession: GAZ:00000448
    description: Geographic location where sample was collected
    requirement: recommended
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: ontology
        params:
          ontologies:
            - gaz
          error_level: warning
          description: Should be a valid GAZ term or coordinates
          examples:
            - Pacific Ocean
            - Amazon rainforest
            - 47.6062° N, 122.3321° W

  - name: characteristics[collection date]
    ontology_accession: NCIT:C81286
    description: Date when sample was collected
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: date
        params:
          format: iso8601
          precision: [year, month, day]
          error_level: warning
          description: Sample collection date
          examples:
            - "2024"
            - "2024-01"
            - "2024-01-15"

  - name: characteristics[depth]
    ontology_accession: PATO:0001595
    description: Depth at which sample was collected
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: number_with_unit
        params:
          units: [m, cm, mm]
          error_level: error
          description: Depth with unit
          examples:
            - 10 m
            - 50 cm
            - 100 m

  - name: characteristics[temperature]
    ontology_accession: PATO:0000146
    description: Temperature at sampling location
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: number_with_unit
        params:
          units: ["°C"]
          allow_negative: true
          error_level: error
          description: Temperature in Celsius
          examples:
            - 25 °C
            - 4 °C
            - -20 °C

  - name: characteristics[ph]
    ontology_accession: PATO:0001842
    description: pH at sampling location
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^\d+(\.\d+)?$
          description: pH value
          examples:
            - 7.0
            - 5.5
            - 8.2

  - name: characteristics[host organism]
    ontology_accession: APOLLO_SV:00000238
    description: Host organism for host-associated microbiome samples
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: ontology
        params:
          ontologies:
            - ncbitaxon
          error_level: warning
          description: Should be a valid NCBI Taxonomy term
          examples:
            - Homo sapiens
            - Mus musculus

  - name: characteristics[host disease]
    ontology_accession: PRIDE:0000682
    description: Disease state of the host organism
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: ontology
        params:
          ontologies:
            - mondo
            - doid
          error_level: warning
          description: Should be a valid disease ontology term
          examples:
            - inflammatory bowel disease
            - colorectal cancer
            - healthy

  - name: comment[metagenome accession]
    ontology_accession: PRIDE:0000956
    description: Accession number for matched metagenome data
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: accession
        params:
          prefix: "[A-Z]+"
          suffix: "\\d+"
          error_level: error
          description: Database accession number
          examples:
            - MGYA00001234
            - SRP123456

  - name: comment[sample storage]
    ontology_accession: PRIDE:0000730
    description: Storage conditions for the sample before analysis
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: Storage conditions
          examples:
            - -80C
            - liquid nitrogen
            - 4C

  # ==========================================================================
  # ENVIRONMENTAL CONTEXT - Aquatic Samples
  # ==========================================================================

  - name: characteristics[altitude]
    ontology_accession: PATO:0000118
    description: Altitude or elevation of terrestrial sampling site
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: number_with_unit
        params:
          units: [m]
          error_level: warning
          description: Altitude with unit
          examples:
            - 500 m
            - 1200 m
            - 0 m

  - name: characteristics[water body type]
    ontology_accession: ENVO:00000063
    description: Type of water body from which sample was collected
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: ontology
        params:
          ontologies:
            - envo
          error_level: warning
          description: Should be a valid ENVO term for water body type
          examples:
            - ocean
            - lake
            - river
            - estuary
            - pond

  - name: characteristics[salinity]
    ontology_accession: PATO:0000014
    description: Salinity measurement of the water sample
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^[\d.]+\s*(PSU|ppt|g/L)$|^(freshwater|brackish|marine)$
          description: Salinity value with unit or descriptive term
          examples:
            - 35 PSU
            - freshwater
            - brackish

  - name: characteristics[dissolved oxygen]
    ontology_accession: ENVO:09200021
    description: Dissolved oxygen concentration in water sample
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^[\d.]+\s*mg/L$|^(hypoxic|anoxic|oxic)$
          description: Dissolved oxygen with unit or descriptive term
          examples:
            - 8.5 mg/L
            - hypoxic
            - anoxic

  - name: characteristics[chlorophyll]
    ontology_accession: CHEBI:28966
    description: Chlorophyll concentration if measured
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: number_with_unit
        params:
          units: [ug/L, mg/L]
          error_level: warning
          description: Chlorophyll concentration with unit
          examples:
            - 2.5 ug/L
            - 0.1 mg/L

  - name: characteristics[sampling depth zone]
    ontology_accession: ENVO:00000015
    description: Ecological depth zone of the sampling site
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: values
        params:
          values:
            - epipelagic
            - mesopelagic
            - bathypelagic
            - abyssopelagic
            - hadopelagic
            - benthic
            - surface
          error_level: warning
          description: Ocean depth zone

  # ==========================================================================
  # ENVIRONMENTAL CONTEXT - Soil Samples
  # ==========================================================================

  - name: characteristics[soil type]
    ontology_accession: ENVO:00001998
    description: Soil classification type
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: ontology
        params:
          ontologies:
            - envo
          error_level: warning
          description: Should be a valid ENVO soil type term
          examples:
            - sandy loam
            - clay
            - peat
            - silt

  - name: characteristics[soil horizon]
    ontology_accession: ENVO:00005802
    description: Soil horizon from which sample was collected
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: values
        params:
          values:
            - O horizon
            - A horizon
            - B horizon
            - C horizon
            - E horizon
            - R horizon
          error_level: warning
          description: Soil horizon

  - name: characteristics[land use]
    ontology_accession: ENVO:00000111
    description: Land use type at sampling site
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: Land use type
          examples:
            - agricultural
            - forest
            - urban
            - grassland
            - wetland

  - name: characteristics[vegetation]
    ontology_accession: ENVO:01000623
    description: Dominant vegetation at sampling site
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: Vegetation description
          examples:
            - deciduous forest
            - corn field
            - prairie
            - tropical rainforest

  # ==========================================================================
  # HOST-ASSOCIATED SAMPLES
  # ==========================================================================

  - name: characteristics[host age]
    ontology_accession: EFO:0000246
    description: Age of host organism for host-associated microbiome samples
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^\d+[YMWDH]$
          description: Age in standard format (Y=year, M=month, W=week, D=day, H=hour)
          examples:
            - 45Y
            - 8W
            - 3M
            - P10D

  - name: characteristics[body site]
    ontology_accession: UBERON:0000061
    description: Specific body site for host-associated microbiome samples
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: ontology
        params:
          ontologies:
            - uberon
            - bto
          error_level: warning
          description: Body site should be a valid UBERON or BTO term
          examples:
            - stool
            - oral cavity
            - skin
            - vaginal

  - name: characteristics[host diet]
    ontology_accession: NCIT:C17806
    description: Diet information for the host organism
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: Diet description
          examples:
            - omnivore
            - vegan
            - western diet
            - high-fiber

  - name: characteristics[antibiotic treatment]
    ontology_accession: NCIT:C274
    description: Recent antibiotic exposure of the host
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: Antibiotic treatment description
          examples:
            - none
            - amoxicillin 7 days prior
            - broad-spectrum

  - name: characteristics[microbiome source]
    ontology_accession: PRIDE:0000957
    description: Source of the microbiome being studied (e.g., gut microbiome, rhizosphere microbiome)
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: Microbiome source description
          examples:
            - gut microbiome
            - rhizosphere microbiome
            - oral microbiome
            - skin microbiome

  # ==========================================================================
  # MOCK COMMUNITY / QC
  # ==========================================================================

  - name: characteristics[mock community]
    ontology_accession: PRIDE:0000958
    description: Identifier or name of mock community standard used
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: Mock community identifier
          examples:
            - ZymoBIOMICS Microbial Community Standard
            - ATCC MSA-1000

  - name: characteristics[mock community composition]
    ontology_accession: PRIDE:0000959
    description: Description of mock community composition (species and ratios)
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: Community composition description
          examples:
            - 8 bacteria + 2 yeasts at defined ratios
            - even mix of 10 species

  - name: comment[expected organism list]
    ontology_accession: PRIDE:0000960
    description: Semicolon-separated list of organisms expected in mock community
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: Semicolon-separated organism list
          examples:
            - E. coli;B. subtilis;S. cerevisiae;L. fermentum
            - Bacillus subtilis;Staphylococcus aureus

  - name: comment[biomass estimation]
    ontology_accession: PRIDE:0000961
    description: Estimated microbial biomass in the sample
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: Biomass estimation
          examples:
            - 1e9 cells/g
            - high biomass
            - low biomass

  - name: comment[host contamination]
    ontology_accession: PRIDE:0000962
    description: Level of host protein contamination if known
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: Host contamination level
          examples:
            - low (<5%)
            - moderate (5-20%)
            - high (>20%)

  - name: comment[contaminant database]
    ontology_accession: PRIDE:0000963
    description: Contaminant database(s) used in database search
    requirement: optional
    allow_not_applicable: true
    allow_not_available: true
    validators:
      - validator_name: pattern
        params:
          pattern: ^.+$
          description: Contaminant database name(s)
          examples:
            - cRAP
            - MaxQuant contaminants
            - cRAP;MaxQuant contaminants
